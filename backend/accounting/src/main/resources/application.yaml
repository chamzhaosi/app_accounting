spring:
  datasource:
    url: jdbc:mysql://localhost:3307/accounting_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  application:
    name: accounting

app:
  jwt:
    secret: test-secret-key-at-least-32-bytes-long-123456  # $env:JWT_SECRET="your-super-secret-key" / echo $env:JWT_SECRET
    expiration-ms: 3600000

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.security: DEBUG